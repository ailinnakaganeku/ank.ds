name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Tokens in sync
        run: |
          npm run generate -w @ankds/tokens
          git diff --exit-code packages/tokens/src/tokens.ts

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build Storybook
        run: npm run build-storybook
